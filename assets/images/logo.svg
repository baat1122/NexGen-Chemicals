<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 350 160" width="100%" height="100%">
  <!-- Leaf Icon (Tilted and Sliced) -->
  <g transform="translate(145, 10)">
    <!-- Base Leaf Path -->
    <path d="M 30 5 C 55 15, 65 45, 55 65 C 45 78, 20 75, 10 60 C 0 45, 10 20, 30 5 Z" fill="#7ac143" />
    
    <!-- White Slices/Stripes -->
    <path d="M -5 12 L 70 12" stroke="#ffffff" stroke-width="3.5" />
    <path d="M -5 22 L 70 22" stroke="#ffffff" stroke-width="3.5" />
    <path d="M -5 32 L 70 32" stroke="#ffffff" stroke-width="3.5" />
    <path d="M -5 42 L 70 42" stroke="#ffffff" stroke-width="3.5" />
    <path d="M -5 52 L 70 52" stroke="#ffffff" stroke-width="3.5" />
    <path d="M -5 62 L 70 62" stroke="#ffffff" stroke-width="3.5" />
    
    <!-- Curving Stem / Outline accent -->
    <path d="M 30 5 Q 35 40 32 72" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.3" />
  </g>

  <!-- NexGen Text -->
  <text x="50%" y="115" text-anchor="middle" font-family="'Outfit', 'Inter', 'Segoe UI', sans-serif" font-weight="800" font-size="36" letter-spacing="-0.5">
    <tspan fill="#7ac143">Nex</tspan><tspan fill="#1e295d">Gen</tspan>
  </text>

  <!-- Horizontal Divider Line -->
  <line x1="80" y1="128" x2="270" y2="128" stroke="#1e295d" stroke-width="1" opacity="0.8" />

  <!-- Chemicals Subtitle -->
  <text x="50%" y="148" text-anchor="middle" font-family="'Outfit', 'Inter', 'Segoe UI', sans-serif" font-weight="500" font-size="14" fill="#334155" letter-spacing="9">
    CHEMICALS
  </text>
</svg>
